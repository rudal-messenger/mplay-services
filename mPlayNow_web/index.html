<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>mPlay NOW</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="overlay">

<header>

<div id="title">

<h1>mPlay NOW</h1>
<p>Get a quick view on what's new:</p>

</div>

</header>

<div id="content">

<div class="panel yellow">

<h2>Patch Notes</h2>

<ul id="patchNotes"></ul>

<hr>

<h2>MY CREW</h2>

<div id="crew"></div>

</div>

<div class="panel cyan">

<h1 id="featuredTitle"></h1>

<p id="featuredText"></p>

</div>

<div class="panel blue">

<h2>DRIVER-ID</h2>

<img id="avatar" src="assets/avatar.png">

<h1 id="driverName"></h1>

<h3>New Messages</h3>

<div id="messages"></div>

</div>

</div>

<footer>

Press "V" to exit

</footer>

</div>

<script src="app.js"></script>

</body>
</html>
